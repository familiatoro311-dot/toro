<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toro - Sistema de Ventas Estable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-principal: #e2ede2;
            --verde-contenedor: #b7d1b7;
            --verde-oscuro: #587258;
            --texto-principal: #424942;
            --blanco: #ffffff;
            --fuente: 'Montserrat', sans-serif;
            --radio: 20px;
            --rojo-alerta: #c86a6a;
            --azul-boton: #4a7a96;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--fuente);
            color: var(--texto-principal);
        }

        body {
            background-color: var(--blanco);
            min-height: 100vh;
            overflow-y: auto; 
            position: relative;
            padding-bottom: 90px; 
        }

        /* --- SIDEBAR --- */
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 60px;
            background-color: var(--verde-contenedor);
            height: 100vh;
            border-top-right-radius: var(--radio);
            border-bottom-right-radius: var(--radio);
            transition: width 0.3s ease;
            padding-top: 20px;
            z-index: 1000;
        }

        #sidebar.abierto { width: 200px; }

        .btn-menu {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            margin-bottom: 30px;
            display: block;
            width: 100%;
            text-align: center;
        }

        .nav-item {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            padding: 15px;
            cursor: pointer;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
        }

        .nav-item span {
            display: inline-block;
            margin-left: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #sidebar.abierto .nav-item span { opacity: 1; }
        .nav-item.activo { background-color: var(--bg-principal); border-radius: 10px 0 0 10px; }

        .sub-menu-reportes {
            display: none;
            width: 100%;
            padding: 0 10px;
            margin-top: 5px;
        }
        #sidebar.abierto .sub-menu-reportes.visible { display: block; }
        .sub-nav-item {
            background-color: var(--blanco);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 11px;
            cursor: pointer;
            text-align: left;
            width: 100%;
            margin-bottom: 4px;
        }
        .sub-nav-item.activo { background-color: var(--verde-oscuro); color: var(--blanco); }

        /* --- CONTENEDOR PRINCIPAL --- */
        #contenido-app {
            margin-left: 65px;
            padding: 15px;
            min-height: 100vh;
        }

        .header-app {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .titulo-pantalla { font-size: 20px; font-weight: 700; text-transform: uppercase; }

        .tasa-box {
            font-size: 13px;
            font-weight: 700;
            background: var(--bg-principal);
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
        }

        .pantalla { display: none; }
        .pantalla.activa { display: block; }

        .caja-contenedor {
            background-color: var(--bg-principal);
            border-radius: var(--radio);
            padding: 15px;
            margin-bottom: 20px;
            overflow-x: auto; 
        }

        /* --- BARRA DE BÚSQUEDA --- */
        .buscador-container {
            display: flex;
            background: var(--blanco);
            border: 1px solid var(--texto-principal);
            border-radius: 15px;
            margin-bottom: 15px;
            height: 45px;
            overflow: hidden;
        }

        .search-badge {
            background-color: var(--verde-contenedor);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 10px;
            padding: 0 10px;
            border-right: 1px solid var(--texto-principal);
        }

        .buscador-input {
            flex: 1;
            border: none;
            padding: 0 10px;
            font-size: 14px;
            outline: none;
            text-transform: uppercase;
        }

        .btn-qr { width: 50px; background-color: var(--verde-contenedor); border: none; border-left: 1px solid var(--texto-principal); cursor: pointer; font-size: 18px; }

        .resultados-busqueda {
            position: absolute;
            background: var(--blanco);
            border: 1px solid var(--texto-principal);
            border-radius: 10px;
            z-index: 2000;
            width: calc(100% - 100px);
            max-height: 200px;
            overflow-y: auto;
            display: none;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }

        .resultado-item { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; }

        /* --- CARDS CARRITO --- */
        .carrito-item-card { background: var(--blanco); border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .carrito-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
        .carrito-prod-titulo { font-size: 14px; font-weight: 700; text-transform: uppercase; word-break: break-word; flex: 1; }
        .carrito-controles-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 10px; }
        .payment-group { display: flex; gap: 4px; }
        .btn-pay { background-color: transparent; border: 1px solid var(--texto-principal); padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .btn-pay.selected { background-color: var(--verde-oscuro); color: var(--blanco); border-color: var(--verde-oscuro); }

        .stock-control { display: flex; align-items: center; gap: 8px; }
        .btn-stock { background: var(--bg-principal); border: 1px solid rgba(0,0,0,0.1); font-size: 16px; font-weight: 700; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .stock-control span { font-weight: 700; font-size: 14px; min-width: 20px; text-align: center; }

        /* --- TABLAS RESPONSIVAS --- */
        .tabla-toro { width: 100%; border-collapse: collapse; min-width: 720px; }
        .tabla-toro th { text-transform: uppercase; font-size: 11px; font-weight: 700; text-align: left; padding: 10px 8px; border-bottom: 1px solid rgba(0,0,0,0.1); white-space: nowrap; }
        .tabla-toro td { padding: 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 13px; vertical-align: middle; }
        
        /* BOTONES DE CONTROL DE ACCIONES EN REPORTES */
        .reporte-acciones-container { display: flex; gap: 6px; }
        .btn-anular-reporte { background: var(--blanco); border: 1px solid var(--rojo-alerta); color: var(--rojo-alerta); padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-modificar-reporte { background: var(--blanco); border: 1px solid var(--azul-boton); color: var(--azul-boton); padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-modificar-reporte:hover { background: var(--azul-boton); color: var(--blanco); }
        .btn-anular-reporte:hover { background: var(--rojo-alerta); color: var(--blanco); }

        /* CARDS RESUMEN */
        .resumen-cards-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .card-resumen { background: var(--bg-principal); padding: 10px; border-radius: 12px; flex: 1; text-align: center; }
        .card-resumen p { font-size: 9px; font-weight: 700; text-transform: uppercase; opacity: 0.7; margin-bottom: 2px; }
        .card-resumen h3 { font-size: 13px; font-weight: 700; color: var(--verde-oscuro); }

        /* BARRA FIJA INFERIOR */
        .total-box {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--blanco); border-top: 2px solid var(--verde-contenedor);
            padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 2000;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }
        .btn-procesar-venta { background-color: var(--verde-oscuro); color: var(--blanco); border: none; padding: 12px 24px; border-radius: 15px; font-weight: 700; font-size: 13px; cursor: pointer; text-transform: uppercase; }
        .total-monto { text-align: right; }

        .btn-primario { background-color: var(--verde-oscuro); color: var(--blanco); border: none; padding: 12px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-bottom: 15px; text-transform: uppercase; font-size: 12px; }
        .vacio-msg { text-align: center; padding: 40px 0; font-style: italic; opacity: 0.6; }
        
        .sync-indicator { font-size: 9px; font-weight: 700; background: rgba(88, 114, 88, 0.1); padding: 4px 8px; border-radius: 8px; display: inline-flex; align-items: center; margin-left: 8px; }
        .sync-dot { width: 6px; height: 6px; background-color: #587258; border-radius: 50%; margin-right: 4px; }
        .sync-dot.loading { background-color: #c8a36a; animation: pulse 1s infinite alternate; }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav id="sidebar">
        <button class="btn-menu" onclick="toggleMenu()">☰</button>
        <div class="nav-item activo" id="nav-ventas-tab" onclick="cambiarPantalla('ventas', this)">🏪 <span>Ventas</span></div>
        <div class="nav-item" onclick="cambiarPantalla('inventario', this)">📦 <span>Inventario</span></div>
        <div class="nav-item" id="nav-reportes-main" onclick="cambiarPantalla('reportes', this)">📈 <span>Reportes</span></div>
        
        <div id="sub-menu-reportes-container" class="sub-menu-reportes">
            <button class="sub-nav-item activo" onclick="filtrarReporteTiempo('hoy', this)">Hoy</button>
            <button class="sub-nav-item" onclick="filtrarReporteTiempo('semana', this)">Semana</button>
            <button class="sub-nav-item" onclick="filtrarReporteTiempo('mes', this)">Mes</button>
        </div>
    </nav>

    <main id="contenido-app">
        <header class="header-app">
            <div>
                <h1 id="txt-titulo-pantalla" class="titulo-pantalla">Ventas</h1>
                <div class="sync-indicator">
                    <div id="net-dot" class="sync-dot"></div>
                    <span id="net-text">Conectado</span>
                </div>
            </div>
            <div class="tasa-box">1$ = <span id="lbl-tasa-actual">700.00</span> BS</div>
        </header>

        <section id="pantalla-ventas" class="pantalla activa">
            <div class="buscador-container">
                <div class="search-badge">PROD</div>
                <input type="text" id="input-buscar-venta" class="buscador-input" placeholder="BUSCAR REPUESTO..." oninput="filtrarBusquedaVenta(this.value)" autocomplete="off">
                <button class="btn-qr">📷</button>
            </div>
            <div id="box-resultados" class="resultados-busqueda"></div>

            <div id="lista-carrito"></div>
            <div id="msg-carrito-vacio" class="vacio-msg">El carrito está vacío. Busca un repuesto arriba.</div>
            
            <div class="total-box">
                <button class="btn-procesar-venta" onclick="procesarVentaCierre()">Procesar Venta</button>
                <div class="total-monto">
                    <div style="font-size: 20px; font-weight:700;" id="total-usd">0.00$</div>
                    <div style="font-size: 11px; opacity:0.8;" id="total-bs">0,00 Bs</div>
                </div>
            </div>
        </section>

        <section id="pantalla-inventario" class="pantalla">
            <div class="caja-contenedor">
                <table class="tabla-toro">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Marca</th>
                            <th>Stock</th>
                            <th>Precio Venta</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-inventario-body"></tbody>
                </table>
            </div>
        </section>

        <section id="pantalla-reportes" class="pantalla">
            <div class="resumen-cards-container">
                <div class="card-resumen"><p>Bruto</p><h3 id="card-total-usd">0.00$</h3></div>
                <div class="card-resumen"><p>Bolívares</p><h3 id="card-total-bs">0 Bs</h3></div>
                <div class="card-resumen"><p>Transac.</p><h3 id="card-cant-ventas">0</h3></div>
            </div>
            <div class="caja-contenedor">
                <table class="tabla-toro">
                    <thead id="tabla-reportes-header"></thead>
                    <tbody id="tabla-reportes-body"></tbody>
                </table>
                <div id="msg-reportes-vacio" class="vacio-msg">No hay registros guardados.</div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx5d9ZsEe0AEjwaE1R-uPVP5zh6g6obIALG_RE9k6t7U4PKbsZzNlbet9zEMwjcJVvi/exec";
        let cacheProductos = [];
        let cacheVentas = [];
        let carrito = [];
        let filtroTiempoActual = 'hoy';
        let ventaEditandoId = null; 

        // TOTALMENTE CORREGIDO: Uso estricto de la clase 'abierto'
        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('abierto'); 
        }
        
        function getTasa() { return 700; }

        function setNetStatus(loading, text = "Conectado") {
            document.getElementById('net-dot').className = loading ? "sync-dot loading" : "sync-dot";
            document.getElementById('net-text').innerText = text;
        }

        async function sincronizarTodo(silencioso = false) {
            if(!silencioso) setNetStatus(true);
            try {
                let resProd = await fetch(`${API_URL}?action=obtenerProductos`);
                cacheProductos = await resProd.json();
                let resVentas = await fetch(`${API_URL}?action=obtenerVentas`);
                cacheVentas = await resVentas.json();
                renderizarInventario();
                renderizarReportes();
                setNetStatus(false, "Al día");
            } catch (err) { setNetStatus(false, "Offline"); }
        }

        function cambiarPantalla(pantallaId, elemento) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('activo'));
            
            document.getElementById(`pantalla-${pantallaId}`).classList.add('activa');
            if(elemento) elemento.classList.add('activo');
            document.getElementById('txt-titulo-pantalla').innerText = pantallaId.toUpperCase();
            
            const subMenu = document.getElementById('sub-menu-reportes-container');
            if(pantallaId === 'reportes') {
                subMenu.classList.add('visible');
            } else {
                subMenu.classList.remove('visible');
            }
            document.getElementById('sidebar').classList.remove('abierto');
        }

        function filtrarReporteTiempo(rango, boton) {
            document.querySelectorAll('.sub-nav-item').forEach(b => b.classList.remove('activo'));
            boton.classList.add('activo');
            filtroTiempoActual = rango;
            renderizarReportes();
            document.getElementById('sidebar').classList.remove('abierto');
        }

        function renderizarInventario() {
            let tbody = document.getElementById('tabla-inventario-body');
            tbody.innerHTML = '';
            cacheProductos.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><small>${p.codigo}</small></td>
                        <td><strong>${p.nombre}</strong></td>
                        <td>${p.marca}</td>
                        <td>
                            <div class="stock-control">
                                <button class="btn-stock" onclick="modificarStockLocal('${p.codigo}', -1)">-</button>
                                <span>${p.stock}</span>
                                <button class="btn-stock" onclick="modificarStockLocal('${p.codigo}', 1)">+</button>
                            </div>
                        </td>
                        <td><strong>${parseFloat(p.venta_usd).toFixed(2)}$</strong></td>
                    </tr>`;
            });
        }

        async function modificarStockLocal(codigo, cambio) {
            let p = cacheProductos.find(item => item.codigo === codigo);
            if(p) { p.stock = Math.max(0, p.stock + cambio); renderizarInventario(); }
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "modificarStock", codigo: codigo, cambio: cambio }) });
            } catch(e) { setNetStatus(false, "Error"); }
        }

        function filtrarBusquedaVenta(query) {
            let box = document.getElementById('box-resultados');
            if(!query.trim()) { box.style.display = 'none'; return; }
            box.innerHTML = '';
            let txt = query.toUpperCase();
            cacheProductos.forEach(p => {
                if(p.nombre.includes(txt) || p.codigo.includes(txt)) {
                    box.style.display = 'block';
                    box.innerHTML += `
                        <div class="resultado-item" onclick="agregarAlCarrito('${p.codigo}')">
                            <span>${p.nombre} (${p.marca})</span>
                            <strong>${parseFloat(p.venta_usd).toFixed(2)}$</strong>
                        </div>`;
                }
            });
        }

        function agregarAlCarrito(codigo) {
            document.getElementById('box-resultados').style.display = 'none';
            document.getElementById('input-buscar-venta').value = '';
            let ex = carrito.find(item => item.codigo === codigo);
            if(ex) { ex.cantidad++; renderizarCarrito(); return; }
            let p = cacheProductos.find(item => item.codigo === codigo);
            if(p) { carrito.push({ codigo: p.codigo, nombre: p.nombre, precio: parseFloat(p.venta_usd), pago: 'PM', cantidad: 1 }); renderizarCarrito(); }
        }

        function cambiarCantidadCarrito(idx, cambio) {
            carrito[idx].cantidad += cambio;
            if(carrito[idx].cantidad <= 0) { if(confirm("¿Quitar producto del carrito?")) carrito.splice(idx, 1); else carrito[idx].cantidad = 1; }
            renderizarCarrito();
        }

        function cambiarMetodoPago(idx, m) { carrito[idx].pago = m; renderizarCarrito(); }

        function renderizarCarrito() {
            let container = document.getElementById('lista-carrito');
            let msg = document.getElementById('msg-carrito-vacio');
            container.innerHTML = '';
            if(carrito.length === 0) { msg.style.display = 'block'; actualizarTotalesCaja(); return; }
            msg.style.display = 'none';

            carrito.forEach((item, index) => {
                container.innerHTML += `
                    <div class="carrito-item-card">
                        <div class="carrito-header-row">
                            <div class="carrito-prod-titulo">${item.nombre} - ${(item.precio * item.cantidad).toFixed(2)}$</div>
                        </div>
                        <div class="carrito-controles-row">
                            <div class="payment-group">
                                <button class="btn-pay ${item.pago === 'Bs' ? 'selected' : ''}" onclick="cambiarMetodoPago(${index}, 'Bs')">Bs</button>
                                <button class="btn-pay ${item.pago === 'PM' ? 'selected' : ''}" onclick="cambiarMetodoPago(${index}, 'PM')">PM</button>
                                <button class="btn-pay ${item.pago === '$' ? 'selected' : ''}" onclick="cambiarMetodoPago(${index}, '$')">$</button>
                            </div>
                            <div class="stock-control">
                                <button class="btn-stock" onclick="cambiarCantidadCarrito(${index}, -1)">-</button>
                                <span>${item.cantidad}</span>
                                <button class="btn-stock" onclick="cambiarCantidadCarrito(${index}, 1)">+</button>
                            </div>
                        </div>
                    </div>`;
            });
            actualizarTotalesCaja();
        }

        function actualizarTotalesCaja() {
            let total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            document.getElementById('total-usd').innerText = `${total.toFixed(2)}$`;
            document.getElementById('total-bs').innerText = `${(total * getTasa()).toLocaleString('es-VE')} Bs`;
        }

        async function procesarVentaCierre() {
            if(carrito.length === 0) return;
            let total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            let copia = [...carrito];
            
            let payload = { 
                action: "procesarVenta", 
                items: copia, 
                total_usd: total, 
                tasa_applied: getTasa() 
            };
            
            if(ventaEditandoId !== null) {
                payload.modificarVentaId = ventaEditandoId;
            }

            carrito = []; 
            ventaEditandoId = null; 
            renderizarCarrito();
            setNetStatus(true);
            
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                sincronizarTodo(true);
            } catch(e) { setNetStatus(false, "Error Guardando"); }
        }

        function renderizarReportes() {
            let thead = document.getElementById('tabla-reportes-header');
            let tbody = document.getElementById('tabla-reportes-body');
            let msg = document.getElementById('msg-reportes-vacio');
            tbody.innerHTML = '';
            
            if(filtroTiempoActual === 'hoy') {
                thead.innerHTML = `<tr><th>Hora</th><th>Vendido</th><th>Monto</th><th>Acciones</th></tr>`;
            } else {
                thead.innerHTML = `<tr><th>Fecha</th><th>Detalle</th><th>Monto</th></tr>`;
            }

            let ahora = new Date(), totalUSD = 0, trans = 0, hayDatos = false;
            let ordenadas = [...cacheVentas].reverse();

            ordenadas.forEach(v => {
                let fv = new Date(v.fecha), cumple = false;
                if(filtroTiempoActual === 'hoy') cumple = fv.toDateString() === ahora.toDateString();
                else if(filtroTiempoActual === 'semana') { let s7 = new Date(); s7.setDate(ahora.getDate() - 7); cumple = fv >= s7; }
                else if(filtroTiempoActual === 'mes') cumple = fv.getMonth() === ahora.getMonth() && fv.getFullYear() === ahora.getFullYear();

                if(cumple) {
                    hayDatos = true;
                    let t_usd = parseFloat(v.total_usd);
                    totalUSD += t_usd;
                    trans++;

                    let itemsObj = [];
                    try { itemsObj = JSON.parse(v.items); } catch(e) { itemsObj = v.items || []; }
                    let listaNombres = itemsObj.map(i => `${i.cantidad}x ${i.nombre}`).join(', ');

                    if(filtroTiempoActual === 'hoy') {
                        let horaStr = fv.toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit' });
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${horaStr}</strong></td>
                                <td><small>${listaNombres}</small></td>
                                <td><strong>${t_usd.toFixed(2)}$</strong></td>
                                <td>
                                    <div class="reporte-acciones-container">
                                        <button class="btn-modificar-reporte" onclick="cargarVentaParaModificar(${v.id}, '${escape(v.items)}')">Modificar</button>
                                        <button class="btn-anular-reporte" onclick="anularVentaNube(${v.id})">Anular</button>
                                    </div>
                                </td>
                            </tr>`;
                    } else {
                        let fechaStr = fv.toLocaleDateString('es-VE', { day: '2-digit', month: '2-digit' });
                        tbody.innerHTML += `<tr><td><strong>${fechaStr}</strong></td><td><small>${listaNombres}</small></td><td><strong>${t_usd.toFixed(2)}$</strong></td></tr>`;
                    }
                }
            });

            msg.style.display = hayDatos ? 'none' : 'block';
            document.getElementById('card-total-usd').innerText = `${totalUSD.toFixed(2)}$`;
            document.getElementById('card-total-bs').innerText = `${(totalUSD * getTasa()).toLocaleString('es-VE', {maximumFractionDigits: 0})} Bs`;
            document.getElementById('card-cant-ventas').innerText = trans;
        }

        function cargarVentaParaModificar(idVenta, itemsEscaped) {
            if(confirm("¿Deseas cargar esta venta en el carrito para modificarla o procesar una devolución?")) {
                try {
                    let itemsObj = JSON.parse(unescape(itemsEscaped));
                    carrito = itemsObj.map(i => ({
                        codigo: i.codigo,
                        nombre: i.nombre,
                        precio: parseFloat(i.precio),
                        pago: i.pago || 'PM',
                        cantidad: parseInt(i.cantidad)
                    }));
                    ventaEditandoId = idVenta; 
                    renderizarCarrito();
                    cambiarPantalla('ventas', document.getElementById('nav-ventas-tab'));
                } catch(e) {
                    alert("Error al intentar reabrir los productos de esta venta.");
                }
            }
        }

        async function anularVentaNube(idVenta) {
            if(!confirm("¿Estás seguro de que deseas eliminar y anular permanentemente esta venta en la nube? El stock se devolverá.")) return;
            setNetStatus(true);
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "anularVenta", idVenta: idVenta }) });
                sincronizarTodo(true);
            } catch(e) { setNetStatus(false, "Error Red"); }
        }

        window.onload = function() { sincronizarTodo(); };
    </script>
</body>
</html>
