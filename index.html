<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toro - Sistema de Ventas Móvil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-principal: #e2ede2;
            --verde-contenedor: #b7d1b7;
            --verde-oscuro: #587258;
            --texto-principal: #424942;
            --blanco: #ffffff;
            --fuente: 'Montserrat', sans-serif;
            --radio: 20px;
            --rojo-alerta: #c86a6a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--fuente);
            color: var(--texto-principal);
        }

        /* CORRECCIÓN CENTRAL: Permitir scroll vertical real en el teléfono */
        body {
            background-color: var(--blanco);
            min-height: 100vh;
            overflow-y: auto; 
            position: relative;
            padding-bottom: 80px; /* Espacio de seguridad para que el botón de procesar venta no tape nada */
        }

        /* --- MENÚ LATERAL MEJORADO PARA MÓVIL --- */
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 60px;
            background-color: var(--verde-contenedor);
            height: 100vh;
            border-top-right-radius: var(--radio);
            border-bottom-right-radius: var(--radio);
            transition: width 0.3s ease;
            padding-top: 20px;
            z-index: 1000;
        }

        #sidebar.abierto {
            width: 200px;
        }

        .btn-menu {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            margin-bottom: 30px;
            display: block;
            width: 100%;
            text-align: center;
        }

        .nav-item {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            padding: 15px;
            cursor: pointer;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
        }

        .nav-item span {
            display: inline-block;
            margin-left: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #sidebar.abierto .nav-item span {
            opacity: 1;
        }

        .nav-item.activo {
            background-color: var(--bg-principal);
            border-radius: 10px 0 0 10px;
        }

        /* --- CONTENEDOR DE LA APP (YA NO ESTÁ CONGELADO) --- */
        #contenido-app {
            margin-left: 65px;
            padding: 15px;
            min-height: 100vh;
        }

        .header-app {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .titulo-pantalla {
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .tasa-box {
            font-size: 13px;
            font-weight: 700;
            background: var(--bg-principal);
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
        }

        /* --- PESTAÑAS --- */
        .pantalla {
            display: none;
        }

        .pantalla.activa {
            display: block;
        }

        /* CAJA VERDE CONTENEDORA (Con scroll propio si se necesita) */
        .caja-contenedor {
            background-color: var(--bg-principal);
            border-radius: var(--radio);
            padding: 15px;
            margin-bottom: 20px;
            overflow-x: auto; /* Scroll horizontal si las tablas son muy anchas */
        }

        /* --- BARRA DE BÚSQUEDA --- */
        .buscador-container {
            display: flex;
            background: var(--blanco);
            border: 1px solid var(--texto-principal);
            border-radius: 15px;
            margin-bottom: 15px;
            height: 45px;
            overflow: hidden;
        }

        .search-badge {
            background-color: var(--verde-contenedor);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 10px;
            padding: 0 10px;
            border-right: 1px solid var(--texto-principal);
        }

        .buscador-input {
            flex: 1;
            border: none;
            padding: 0 10px;
            font-size: 14px;
            outline: none;
            text-transform: uppercase;
        }

        .btn-qr {
            width: 50px;
            background-color: var(--verde-contenedor);
            border: none;
            border-left: 1px solid var(--texto-principal);
            cursor: pointer;
            font-size: 18px;
        }

        /* RESULTADOS BÚSQUEDA FLOTANTE */
        .resultados-busqueda {
            position: absolute;
            background: var(--blanco);
            border: 1px solid var(--texto-principal);
            border-radius: 10px;
            z-index: 2000;
            width: calc(100% - 100px);
            max-height: 200px;
            overflow-y: auto;
            display: none;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }

        .resultado-item {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
        }

        /* --- REESTRUCTURACIÓN COMPLETA DEL CARRITO EN MÓVIL --- */
        .carrito-item-card {
            background: var(--blanco);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .carrito-prod-titulo {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .carrito-controles-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed rgba(0,0,0,0.1);
            padding-top: 10px;
        }

        .payment-group {
            display: flex;
            gap: 4px;
        }

        .btn-pay {
            background-color: transparent;
            border: 1px solid var(--texto-principal);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-pay.selected {
            background-color: var(--verde-oscuro);
            color: var(--blanco);
            border-color: var(--verde-oscuro);
        }

        /* ARREGLO DE LOS BOTONES + Y - SUPERPUESTOS */
        .stock-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-stock {
            background: var(--bg-principal);
            border: 1px solid rgba(0,0,0,0.1);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stock-control span {
            font-weight: 700;
            font-size: 14px;
            min-width: 20px;
            text-align: center;
        }

        /* --- ARREGLO CABECERA DE TABLAS COMPRIMIDAS --- */
        .tabla-toro {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px; /* Obliga a la tabla a no aplastar las letras en el tlf */
        }

        .tabla-toro th {
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            white-space: nowrap;
        }

        .tabla-toro td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 13px;
        }

        /* --- BARRA FIJA INFERIOR PARA PROCESAR VENTA --- */
        .total-box {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--blanco);
            border-top: 2px solid var(--verde-contenedor);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }

        .btn-procesar-venta {
            background-color: var(--verde-oscuro);
            color: var(--blanco);
            border: none;
            padding: 12px 24px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .total-monto {
            text-align: right;
        }

        /* BOTONES NUEVOS */
        .btn-primario {
            background-color: var(--verde-oscuro);
            color: var(--blanco);
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 12px;
        }

        .vacio-msg {
            text-align: center;
            padding: 40px 0;
            font-style: italic;
            opacity: 0.6;
        }

        .sync-indicator {
            font-size: 9px;
            font-weight: 700;
            background: rgba(88, 114, 88, 0.1);
            padding: 4px 8px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            margin-left: 8px;
        }

        .sync-dot {
            width: 6px; height: 6px;
            background-color: #587258;
            border-radius: 50%;
            margin-right: 4px;
        }

        .sync-dot.loading { background-color: #c8a36a; animation: pulse 1s infinite alternate; }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav id="sidebar">
        <button class="btn-menu" onclick="toggleMenu()">☰</button>
        <div class="nav-item activo" onclick="cambiarPantalla('ventas', this)">🏪 <span>Ventas</span></div>
        <div class="nav-item" onclick="cambiarPantalla('inventario', this)">📦 <span>Inventario</span></div>
        <div class="nav-item" onclick="cambiarPantalla('reportes', this)">📈 <span>Reportes</span></div>
    </nav>

    <main id="contenido-app">
        <header class="header-app">
            <div>
                <h1 id="txt-titulo-pantalla" class="titulo-pantalla">Ventas</h1>
                <div class="sync-indicator">
                    <div id="net-dot" class="sync-dot"></div>
                    <span id="net-text">Conectado</span>
                </div>
            </div>
            <div class="tasa-box" onclick="cambiarTasaManual()">1$ = <span id="lbl-tasa-actual">700.00</span> BS</div>
        </header>

        <section id="pantalla-ventas" class="pantalla activa">
            <div class="buscador-container">
                <div class="search-badge">PROD</div>
                <input type="text" id="input-buscar-venta" class="buscador-input" placeholder="BUSCAR REPUESTO..." oninput="filtrarBusquedaVenta(this.value)" autocomplete="off">
                <button class="btn-qr">📷</button>
            </div>
            <div id="box-resultados" class="resultados-busqueda"></div>

            <div id="lista-carrito"></div>
            <div id="msg-carrito-vacio" class="vacio-msg">El carrito está vacío. Busca un repuesto arriba.</div>
            
            <div class="total-box">
                <button class="btn-procesar-venta" onclick="procesarVentaCierre()">Procesar Venta</button>
                <div class="total-monto">
                    <div style="font-size: 20px; font-weight:700;" id="total-usd">0.00$</div>
                    <div style="font-size: 11px; opacity:0.8;" id="total-bs">0,00 Bs</div>
                </div>
            </div>
        </section>

        <section id="pantalla-inventario" class="pantalla">
            <button class="btn-primario">+ Nuevo Producto</button>
            <div class="caja-contenedor">
                <table class="tabla-toro">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Marca</th>
                            <th>Stock</th>
                            <th>Venta ($)</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-inventario-body"></tbody>
                </table>
            </div>
        </section>

        <section id="pantalla-reportes" class="pantalla">
            <div class="caja-contenedor">
                <table class="tabla-toro">
                    <thead>
                        <tr>
                            <th>Hora/Fecha</th>
                            <th>Detalle Productos</th>
                            <th>Monto Total</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-reportes-body"></tbody>
                </table>
                <div id="msg-reportes-vacio" class="vacio-msg">No hay registros hoy.</div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx5d9ZsEe0AEjwaE1R-uPVP5zh6g6obIALG_RE9k6t7U4PKbsZzNlbet9zEMwjcJVvi/exec";
        let cacheProductos = [];
        let cacheVentas = [];
        let carrito = [];

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('abierto');
        }

        function setNetStatus(loading, text = "Conectado") {
            document.getElementById('net-dot').className = loading ? "sync-dot loading" : "sync-dot";
            document.getElementById('net-text').innerText = text;
        }

        async function sincronizarTodo(silencioso = false) {
            if(!silencioso) setNetStatus(true);
            try {
                let resProd = await fetch(`${API_URL}?action=obtenerProductos`);
                cacheProductos = await resProd.json();
                let resVentas = await fetch(`${API_URL}?action=obtenerVentas`);
                cacheVentas = await resVentas.json();
                
                renderizarInventario();
                renderizarReportes();
                setNetStatus(false, "Al día");
            } catch (err) {
                setNetStatus(false, "Offline");
            }
        }

        function cambiarPantalla(pantallaId, elemento) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('activo'));
            document.getElementById(`pantalla-${pantallaId}`).classList.add('activa');
            elemento.classList.add('activo');
            document.getElementById('txt-titulo-pantalla').innerText = pantallaId;
            document.getElementById('sidebar').classList.remove('abierto');
        }

        function renderizarInventario() {
            let tbody = document.getElementById('tabla-inventario-body');
            tbody.innerHTML = '';
            cacheProductos.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td><small>${p.codigo}</small></td>
                        <td><strong>${p.nombre}</strong></td>
                        <td>${p.marca}</td>
                        <td>
                            <div class="stock-control">
                                <button class="btn-stock" onclick="modificarStockLocal('${p.codigo}', -1)">-</button>
                                <span>${p.stock}</span>
                                <button class="btn-stock" onclick="modificarStockLocal('${p.codigo}', 1)">+</button>
                            </div>
                        </td>
                        <td><strong>${parseFloat(p.venta_usd).toFixed(2)}$</strong></td>
                    </tr>`;
            });
        }

        async function modificarStockLocal(codigo, cambio) {
            let p = cacheProductos.find(item => item.codigo === codigo);
            if(p) { p.stock = Math.max(0, p.stock + cambio); renderizarInventario(); }
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "modificarStock", codigo: codigo, cambio: cambio }) });
            } catch(e) { setNetStatus(false, "Error"); }
        }

        function filtrarBusquedaVenta(query) {
            let box = document.getElementById('box-resultados');
            if(!query.trim()) { box.style.display = 'none'; return; }
            box.innerHTML = '';
            let txt = query.toUpperCase();
            cacheProductos.forEach(p => {
                if(p.nombre.includes(txt) || p.codigo.includes(txt)) {
                    box.style.display = 'block';
                    box.innerHTML += `
                        <div class="resultado-item" onclick="agregarAlCarrito('${p.codigo}')">
                            <span>${p.nombre} (${p.marca})</span>
                            <strong>${parseFloat(p.venta_usd).toFixed(2)}$</strong>
                        </div>`;
                }
            });
        }

        function agregarAlCarrito(codigo) {
            document.getElementById('box-resultados').style.display = 'none';
            document.getElementById('input-buscar-venta').value = '';
            let ex = carrito.find(item => item.codigo === codigo);
            if(ex) { ex.cantidad++; renderizarCarrito(); return; }
            let p = cacheProductos.find(item => item.codigo === codigo);
            if(p) { carrito.push({ codigo: p.codigo, nombre: p.nombre, precio: parseFloat(p.venta_usd), pago: 'PM', cantidad: 1 }); renderizarCarrito(); }
        }

        function cambiarCantidadCarrito(idx, cambio) {
            carrito[idx].cantidad += cambio;
            if(carrito[idx].cantidad <= 0) carrito.splice(idx, 1);
            renderizarCarrito();
        }

        function cambiarMetodoPago(idx, m) { carrito[idx].pago = m; renderizarCarrito(); }

        function renderizarCarrito() {
            let container = document.getElementById('lista-carrito');
            let msg = document.getElementById('msg-carrito-vacio');
            container.innerHTML = '';
            if(carrito.length === 0) { msg.style.display = 'block'; actualizarTotalesCaja(); return; }
            msg.style.display = 'none';

            carrito.forEach((item, index) => {
                container.innerHTML += `
                    <div class="carrito-item-card">
                        <div class="carrito-prod-titulo">${item.nombre} - ${(item.precio * item.cantidad).toFixed(2)}$</div>
                        <div class="carrito-controles-row">
                            <div class="payment-group">
                                <button class="btn-pay ${item.pago === 'Bs' ? 'selected' : ''}" onclick="cambiarMetodoPago(${index}, 'Bs')">Bs</button>
                                <button class="btn-pay ${item.pago === 'PM' ? 'selected' : ''}" onclick="cambiarMetodoPago(${index}, 'PM')">PM</button>
                                <button class="btn-pay ${item.pago === '$' ? 'selected' : ''}" onclick="cambiarMetodoPago(${index}, '$')">$</button>
                            </div>
                            <div class="stock-control">
                                <button class="btn-stock" onclick="cambiarCantidadCarrito(${index}, -1)">-</button>
                                <span>${item.cantidad}</span>
                                <button class="btn-stock" onclick="cambiarCantidadCarrito(${index}, 1)">+</button>
                            </div>
                        </div>
                    </div>`;
            });
            actualizarTotalesCaja();
        }

        function actualizarTotalesCaja() {
            let total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            document.getElementById('total-usd').innerText = `${total.toFixed(2)}$`;
            document.getElementById('total-bs').innerText = `${(total * 700).toLocaleString('es-VE')} Bs`;
        }

        async function procesarVentaCierre() {
            if(carrito.length === 0) return;
            let total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
            let copia = [...carrito];
            carrito = []; renderizarCarrito();
            setNetStatus(true);
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "procesarVenta", items: copia, total_usd: total, tasa_applied: 700 }) });
                sincronizarTodo(true);
            } catch(e) { setNetStatus(false, "Error"); }
        }

        function renderizarReportes() {
            let tbody = document.getElementById('tabla-reportes-body');
            let msg = document.getElementById('msg-reportes-vacio');
            tbody.innerHTML = '';
            if(cacheVentas.length === 0) { msg.style.display = 'block'; return; }
            msg.style.display = 'none';
            [...cacheVentas].reverse().forEach(v => {
                let f = new Date(v.fecha).toLocaleDateString();
                tbody.innerHTML += `<tr><td><strong>${f}</strong></td><td><small>Venta General</small></td><td><strong>${parseFloat(v.total_usd).toFixed(2)}$</strong></td></tr>`;
            });
        }

        window.onload = function() { sincronizarTodo(); };
    </script>
</body>
</html>
